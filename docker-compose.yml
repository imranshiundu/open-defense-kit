# docker-compose.yml
# Use: docker compose up -d  then  docker exec -it odk bash
#
# Profiles:
#   (default)  — runs the built image; code is embedded at build time
#   dev        — mounts source directory for live editing without rebuilding
#                docker compose --profile dev up

services:
  odk:
    build:
      context: .
      dockerfile: Dockerfile
    image: odk:latest
    container_name: odk
    stdin_open: true
    tty: true
    # Persist tools installed at runtime across container restarts
    volumes:
      - odk_data:/root/.odk
    restart: unless-stopped

  odk-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: odk:latest
    container_name: odk-dev
    stdin_open: true
    tty: true
    profiles:
      - dev
    volumes:
      # Live source mount — code changes are visible without rebuilding
      - .:/root/open-defense-kit
      - odk_data:/root/.odk
    restart: "no"

volumes:
  odk_data:
